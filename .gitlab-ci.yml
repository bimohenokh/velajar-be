stages:
  - test
  - docker-push
  - deploy

variables:
  IMAGE_FULL_NAME_BACKEND: "$CI_REGISTRY_IMAGE/${DOCKERHUB_USERNAME}/${IMAGE_NAME_BACKEND}"
  IMAGE_FULL_NAME_BACKEND_TASK: "$CI_REGISTRY_IMAGE/${DOCKERHUB_USERNAME}/${IMAGE_NAME_BACKEND_TASK}"

unit-test:
  stage: test
  image: python:3.12
  environment:
    name: test
  before_script:
    - echo "Environment is $CI_ENVIRONMENT_NAME"
    - chmod +x $CI_PROJECT_DIR/generate-env.sh
    - $CI_PROJECT_DIR/generate-env.sh
  script:
    - pip install -r requirements.txt
    - python manage.py test

docker-push:
  stage: docker-push
  image: docker:latest
#  services:
#    - name: docker:dind
#      alias: thedockerhost
#  variables:
#    DOCKER_DRIVER: overlay2
#    DOCKER_TLS_CERTDIR: ""
  environment:
    name: production
  before_script:
    - echo "$DOCKERHUB_PASSWORD" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
    - echo "Environment is $CI_ENVIRONMENT_NAME"
    - ls -la $CI_PROJECT_DIR  # <-- THIS IS THE MOST IMPORTANT DEBUG LINE
    - chmod +x $CI_PROJECT_DIR/generate-env.sh
    - $CI_PROJECT_DIR/generate-env.sh
  script:
    - docker build -t "${IMAGE_FULL_NAME_BACKEND}:latest" .
    - docker push "$IMAGE_FULL_NAME_BACKEND:latest"
    - docker build -t "${IMAGE_FULL_NAME_BACKEND_TASK}:latest" -f Dockerfile-task .
    - docker push "$IMAGE_FULL_NAME_BACKEND_TASK:latest"
  only:
    - main

trigger-deploy:
  stage: deploy
  image: curlimages/curl:latest
  script:
    - >
      curl -X POST
      -F token=glptt-730404b578e55ee59bc4769e573ac753db5c54d1
      -F ref=main
      https://gitlab.cs.ui.ac.id/api/v4/projects/12773/trigger/pipeline
  only:
    - main

